<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Fluvial Dynamics</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background: #000;
    }

    body {
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
    }

    .hero {
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background:
        linear-gradient(rgba(0,0,0,0.42), rgba(0,0,0,0.42)),
        url('river.png') center center / cover no-repeat;
    }

    .hero-inner {
      width: 100%;
      max-width: 900px;
    }

    h1, h2, p, a {
      line-height: 1.5;
      margin: 0;
    }

    h1, p, a {
      font-size: 1.2rem;
    }

    h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
    }

    h1 {
      font-weight: 700;
      margin-bottom: 0.8rem;
    }

    p, a {
      font-weight: 400;
    }

    .sub {
      max-width: 700px;
      margin: 0 auto 1.6rem auto;
      color: rgba(255,255,255,0.95);
    }

    .single-section {
      max-width: 700px;
      margin: 0 auto;
    }

    .single-section p {
      margin-top: 0.8rem;
    }

    .details h1 {
      font-size: calc(1.2rem - 1pt);
    }

    .details p,
    .details a {
      font-size: calc(1.2rem - 1pt);
    }

    a {
      color: #fff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 1000px) {
      h1, h2, p, a {
        font-size: 1.05rem;
      }

      .hero {
        padding: 30px 16px;
      }

      .sub {
        margin-bottom: 1.3rem;
      }

      .details h1 {
        font-size: calc(1.05rem - 1pt);
      }

      .details p,
      .details a {
        font-size: calc(1.05rem - 1pt);
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-inner">
      <h2>Fluvial Dynamics s.r.o.</h2>

      <div class="single-section">
        <p class="sub">
          Specialized analysis of river hydromorphology and advanced GIS data processing.
        </p>
      </div>

      <div class="section details">
        <h1>Company details</h1>
        <p>Fluvial Dynamics s. r. o.</p>
        <p>Zhorínska 27, 84103 Bratislava, Slovakia</p>
        <p>IČO: 53 206 339</p>
        <p>Email: <a href="mailto:contact@fluvialdynamics.eu">contact@fluvialdynamics.eu</a></p>
      </div>
    </div>
  </section>
</body>
</html>
