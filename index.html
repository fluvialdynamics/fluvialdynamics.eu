<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fluvial Dynamics</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
      background: #000;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background:
        linear-gradient(rgba(0,0,0,0.42), rgba(0,0,0,0.42)),
        url('river.png') center center / cover no-repeat;
    }

    .hero-inner {
      width: 100%;
      max-width: 900px;
    }

    h1, p, a {
      font-size: 1.2rem;
      line-height: 1.5;
      margin: 0;
    }

    h1 {
      font-weight: 700;
      margin-bottom: 0.8rem;
    }

    p, a {
      font-weight: 400;
    }

    .sub {
      max-width: 700px;
      margin: 0 auto 1.6rem auto;
      color: rgba(255,255,255,0.95);
    }

    .single-section {
      max-width: 700px;
      margin: 0 auto;
    }

    .single-section p {
      margin-top: 0.8rem;
    }

    a {
      color: #fff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 1000px) {
      h1, p, a {
        font-size: 1.05rem;
      }

      .hero {
        padding: 30px 16px;
      }

      .sub {
        margin-bottom: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-inner">
      <h2>Fluvial Dynamics s.r.o.</h2>

      <div class="single-section">
        <p class="sub">
          Hydraulic and sediment transport analysis for rivers, channels, and restoration-related studies.
        </p>
        <p>
          <a href="mailto:contact@fluvialdynamics.eu">contact@fluvialdynamics.eu</a>
        </p>
      </div>
      <div class="section">
        <h1>Company details</h1>
        <p>Fluvial Dynamics s. r. o.</p>
        <p>Zhorínska 27, 84103 Bratislava, Slovakia</p>
        <p>IČO: 53 206 339</p>
        <p>Email: <a href="mailto:contact@fluvialdynamics.eu">contact@fluvialdynamics.eu</a></p>
      </div>
    </div>
  </section>
</body>
</html>
