<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fluvial Dynamics</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
      background: #000;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background:
        linear-gradient(rgba(0,0,0,0.42), rgba(0,0,0,0.42)),
        url('river.png') center center / cover no-repeat;
    }

    .hero-inner {
      width: 100%;
      max-width: 900px;
    }

    h1, h2, p, a {
      font-size: 1.2rem;
      line-height: 1.5;
      margin: 0;
    }

    h1, h2 {
      font-weight: 700;
    }

    p, a {
      font-weight: 400;
    }

    h1 {
      margin-bottom: 0.8rem;
    }

    .sub {
      max-width: 700px;
      margin: 0 auto 2rem auto;
      color: rgba(255,255,255,0.95);
    }

    .section {
      margin-top: 1.8rem;
    }

    h2 {
      margin-bottom: 0.5rem;
    }

    a {
      color: #fff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      h1, h2, p, a {
        font-size: 1.05rem;
      }

      .hero {
        padding: 30px 16px;
      }

      .sub {
        margin-bottom: 1.6rem;
      }

      .section {
        margin-top: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-inner">
      <h1>Fluvial Dynamics</h1>

      <p class="sub">
        Hydraulic and sediment transport analysis for rivers, channels, and restoration-related studies.
      </p>

      <div class="section">
        <h2>Services</h2>
        <p>
          Hydraulic analysis, sediment transport assessment, river morphology review, and technical support.
        </p>
      </div>

      <div class="section">
        <h2>Contact</h2>
        <p>
          <a href="mailto:contact@fluvialdynamics.eu">contact@fluvialdynamics.eu</a>
        </p>
      </div>
    </div>
  </section>
</body>
</html>
