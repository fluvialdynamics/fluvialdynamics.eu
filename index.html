<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fluvial Dynamics</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #222;
      background: #f6f7f8;
      text-align: center;
    }

    .hero {
      min-height: 68vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background:
        linear-gradient(rgba(0,0,0,0.38), rgba(0,0,0,0.38)),
        url('river.png') center center / cover no-repeat;
    }

    .hero-inner {
      width: 100%;
      max-width: 900px;
      color: white;
      text-align: center;
    }

    h1, h2, p, a {
      font-size: 1.2rem;
    }

    h1, h2 {
      font-weight: 700;
      margin: 0 0 0.6em;
    }

    p {
      font-weight: 400;
      margin: 0;
    }

    .sub {
      max-width: 700px;
      margin: 0 auto;
      color: rgba(255,255,255,0.95);
    }

    .content {
      max-width: 900px;
      margin: -50px auto 40px;
      padding: 0 20px;
      position: relative;
      z-index: 2;
    }

    .panel {
      background: white;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 28px;
    }

    .box {
      padding: 22px 0;
      border-top: 1px solid #e6e6e6;
    }

    .box:first-child {
      border-top: none;
      padding-top: 0;
    }

    a {
      color: #1b5e7a;
      text-decoration: none;
      font-weight: 400;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      h1, h2, p, a {
        font-size: 1.05rem;
      }

      .content {
        margin-top: -30px;
      }

      .panel {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-inner">
      <h1>Fluvial Dynamics</h1>
      <p class="sub">
        Hydraulic and sediment transport analysis for rivers, channels, and restoration-related studies.
      </p>
    </div>
  </section>

  <main class="content">
    <div class="panel">
      <div class="box">
        <h2>Services</h2>
        <p>Hydraulic analysis, sediment transport assessment, river morphology review, and technical support.</p>
      </div>

      <div class="box">
        <h2>Contact</h2>
        <p>Email: <a href="mailto:contact@fluvialdynamics.eu">contact@fluvialdynamics.eu</a></p>
      </div>
    </div>
  </main>
</body>
</html>
